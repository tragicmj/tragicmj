<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b14"/>
      <stop offset="50%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#0a1f2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5c4"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- ambient glow blobs -->
  <circle cx="1000" cy="60" r="180" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="120" cy="280" r="150" fill="url(#glow)" filter="url(#soft)"/>

  <!-- faint circuit grid lines -->
  <g stroke="#1e2a3f" stroke-width="1" opacity="0.6">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="850" y1="0" x2="850" y2="320"/>
  </g>
  <g stroke="#22d3ee" stroke-width="1.4" opacity="0.35">
    <circle cx="850" cy="40" r="3"/>
    <circle cx="850" cy="280" r="3"/>
    <circle cx="0" cy="40" r="3"/>
    <circle cx="1200" cy="280" r="3"/>
  </g>

  <!-- floating particles -->
  <g fill="#22d3ee">
    <circle cx="960" cy="150" r="2.5">
      <animate attributeName="cy" values="150;120;150" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="220" r="2" fill="#818cf8">
      <animate attributeName="cy" values="220;190;220" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.15;0.7" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="100" r="3" fill="#00f5c4">
      <animate attributeName="cy" values="100;70;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- terminal window -->
  <g transform="translate(40,44)">
    <rect width="760" height="232" rx="14" fill="#0b1220" stroke="#233047" stroke-width="1.5"/>
    <rect width="760" height="34" rx="14" fill="#111c30"/>
    <rect y="0" width="760" height="18" fill="#111c30"/>
    <circle cx="24" cy="17" r="6" fill="#ff5f56"/>
    <circle cx="46" cy="17" r="6" fill="#ffbd2e"/>
    <circle cx="68" cy="17" r="6" fill="#27c93f"/>
    <text x="380" y="22" text-anchor="middle" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#5b6b85">javed@dev — zsh</text>

    <g font-family="SFMono-Regular,Consolas,Menlo,monospace" font-size="16">
      <text x="24" y="66" fill="#22d3ee">$ <tspan fill="#7dd3fc">whoami</tspan></text>
      <text x="24" y="92" fill="#e5e7eb" opacity="0">
        &gt; Md Javed Akhtar — Senior Software Engineer
        <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.3s" fill="freeze"/>
      </text>

      <text x="24" y="128" fill="#22d3ee" opacity="0">
        $ <tspan fill="#7dd3fc">cat</tspan> role.txt
        <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.3s" fill="freeze"/>
      </text>
      <text x="24" y="154" fill="#e5e7eb" opacity="0">
        &gt; Full-Stack + React Native @ Book An Artist / Wescover
        <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze"/>
      </text>

      <text x="24" y="190" fill="#22d3ee" opacity="0">
        $ <tspan fill="#7dd3fc">echo</tspan> $CURRENTLY_BUILDING
        <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
      </text>
      <text x="24" y="216" fill="#e5e7eb" opacity="0">
        &gt; creator tools people actually enjoy using
        <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
      </text>

      <rect x="24" y="222" width="9" height="16" fill="#22d3ee" opacity="0">
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.01;0.5;0.51;1" begin="2.9s" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- name / title block -->
  <g transform="translate(850,0)">
    <text x="0" y="120" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="30" font-weight="700" fill="url(#accent)">Md Javed</text>
    <text x="0" y="158" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="30" font-weight="700" fill="url(#accent)">Akhtar</text>
    <text x="0" y="196" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#8b98ad">Senior Software</text>
    <text x="0" y="216" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" fill="#8b98ad">Engineer</text>
  </g>
</svg>
